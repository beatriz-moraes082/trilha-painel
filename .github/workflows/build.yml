name: Build Painel Beatriz

on:
  schedule:
    # A cada 6h (00:00, 06:00, 12:00, 18:00 UTC = 21h, 03h, 09h, 15h BRT)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build.py'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build HTML
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 build.py

      - name: Commit index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "build: atualiza painel $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
